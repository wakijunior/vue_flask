<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/2.3.5/css/dataTables.bootstrap5.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid" style="margin-left: 100px">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#"
                >Register</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#">Employees</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container" id="app">
      <form id="form" name="form" @submit.prevent="registerEmployee">
        <div class="mb-3">
          <label for="name" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="name"
            v-model="name"
            aria-describedby="emailHelp"
          />
        </div>

        <div class="mb-3">
          <label for="location" class="form-label">Age</label>
          <input
            type="text"
            class="form-control"
            id="age"
            v-model="age"
          />
        </div>
        <div class="mb-3">
          <label for="location" class="form-label">Location</label>
          <input
            type="text"
            class="form-control"
            id="location"
            v-model="location"
          />
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
        <i v-if="loader" class="fa-duotone fa-solid fa-spinner"></i>
      </form>

      <div class="alert alert-success" v-if="alertSuccessShow" role="alert">
        {{ alertMessage }}
      </div>
      <div class="alert alert-danger" v-if="alertErrorShow" role="alert">
        {{ alertMessage }}
      </div>

      <hr />

      <div class="mt-3">
        <h2>List of Employees</h2>
      </div>

      <table id="example" class="table table-striped">
        <thead>
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Age</th>
            <th scope="col">Location</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="employee in employees" :key="employee.id">
            <th scope="row">{{ employee.id }}</th>
            <td>{{ employee.name }}</td>
            <td>{{ employee.age }}</td>
            <td>{{ employee.location }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"
      integrity="sha512-Wx8niGbPNCD87mSuF0sBRytwW2+2ZFr7HwVDF8krCb3egstCc4oQfig+/cfg2OHd82KcUlOYxlSDAqdHqK5TCw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.8/axios.js"
      integrity="sha512-+dJa1RvuE8/HFftifMtr7hqixdEkb/DizfXUZAA0pyZeVdNnyZyKy9RnIWi0JSWUznbCNbaQNn0E6nbtrdL+9g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/2.2.4/jquery.js"
      integrity="sha512-OKuL2kpi8zfeXcqSXnGbL6tKc9JxWmppJY4mOSn1EsngRb7fx1N5+7wOTGqu2bI5OAYL3Og7/Beg7EsWG2OBKA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.5/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.5/js/dataTables.bootstrap5.js"></script>
    <!-- <script>
      $(document).ready(function () {
        $("#example").DataTable();
      });
    </script> -->

    <script>
      new Vue({
        el: "#app",
        data: {
          name: "",
          location: "",
          age: "",
          alertSuccessShow: false,
          alertErrorShow: false,
          alertMessage: "",
          loader: false,
          employees : [],
        },
        methods: {
          registerEmployee() {
            if (this.name === "" || this.location === "") {
              this.loader = true;
              this.alertErrorShow = true;
              this.loader = false;
              this.alertMessage = "Enter your name and location!";

              //clear the form fields after successful registration
              this.name = "";
              this.location = "";
              this.age = "";

              setTimeout(() => {
                  location.reload();
                }, 3000);

              //refreshes the page with the new employee
              this.getEmployees()

              // Auto-hide success after 3 seconds
              setTimeout(() => {
                this.alertSuccessShow = false;
              }, 3000);

            } else {
              this.loader = true;
              axios
                .post("http://localhost:5000/employees", {
                  name: this.name,
                  location: this.location,
                  age: this.age
                })
                .then((response) => {
                  this.loader = false;
                  console.log(response.data);
                  this.alertErrorShow = false;
                  this.alertSuccessShow = true;
                  this.alertMessage = "Employee registered successfully";

                  // Clear the form fields after successful registration
                  this.name = "";
                  this.location = "";
                  this.age = "";

                  // Auto-hide success message after 5 seconds
                  setTimeout(() => {
                    this.alertSuccessShow = false;
                  }, 5000);
                })
                .catch((error) => {
                  this.loader = false;
                  console.error("Error registering employee:", error);
                  this.alertSuccessShow = false;
                  this.alertErrorShow = true;

                  this.alertMessage = error;

                  // Auto-hide error after 5 seconds
                  setTimeout(() => {
                    this.alertErrorShow = false;
                  }, 5000);
                });
            }
          },
          getEmployees(){
            axios.get("http://localhost:5000/employees")
            .then((response) => {
              console.log(response.data.data)
              this.employees = response.data.data;
              this.$nextTick(() => {
                  $("#example").DataTable({
                    // Optional: Add this to handle empty/null data gracefully
                    columnDefs: [{ defaultContent: "-", targets: "_all" }],
                  });
                });
            })
            .catch((error) => {
              this.alertErrorShow = true;
              this.alertSuccessShow = false;
              this.alertMessage = "Something Went Wrong"
            })
          }
        },
        mounted(){
          this.getEmployees()
        }
      });
    </script>
  </body>
</html>
